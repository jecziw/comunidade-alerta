services:
  - type: web
    name: comunidade-alerta-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    disk:
      name: comunidade-alerta-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
