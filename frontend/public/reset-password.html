<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Redefinir senha — Comunidade Alerta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#14120E;--paper:#F4EFE4;--red:#C8201A;--muted:#6B6558;--border:rgba(20,18,14,.28)}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{width:400px;border:1px solid var(--border);padding:40px;background:#fff}
h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;margin-bottom:8px}
p{font-size:13px;color:var(--muted);margin-bottom:28px}
label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:6px}
input{width:100%;height:46px;border:1px solid var(--border);padding:0 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px}
input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,32,26,.08)}
button{width:100%;height:46px;background:var(--red);color:#fff;border:none;font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
button:hover{background:#a01812}
.msg{margin-top:14px;font-size:12px;text-align:center;padding:10px;border-radius:2px;display:none}
.ok{background:rgba(46,125,50,.1);color:#2E7D32}
.err{background:rgba(200,32,26,.1);color:var(--red)}
</style>
</head>
<body>
<div class="box">
  <h1>NOVA SENHA</h1>
  <p>Digite sua nova senha para redefinir o acesso.</p>
  <label>Nova senha</label>
  <input type="password" id="pwd" placeholder="Mínimo 8 caracteres"/>
  <label>Confirmar nova senha</label>
  <input type="password" id="pwd2" placeholder="Repita a senha"/>
  <button onclick="reset()">Redefinir senha</button>
  <div class="msg" id="msg"></div>
</div>
<script>
async function reset() {
  const pwd  = document.getElementById('pwd').value;
  const pwd2 = document.getElementById('pwd2').value;
  if (pwd.length < 8)  return show('Senha deve ter no mínimo 8 caracteres.', false);
  if (pwd !== pwd2)    return show('As senhas não coincidem.', false);
  const token = new URLSearchParams(location.search).get('token');
  if (!token)          return show('Token inválido. Solicite um novo reset.', false);
  try {
    const res  = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword: pwd }),
    });
    const data = await res.json();
    if (res.ok) {
      show('Senha redefinida! Redirecionando para o login...', true);
      setTimeout(() => location.href = '/', 2500);
    } else {
      show(data.error || 'Erro ao redefinir senha.', false);
    }
  } catch (e) {
    show('Erro de conexão. Tente novamente.', false);
  }
}
function show(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
}
</script>
</body>
</html>
